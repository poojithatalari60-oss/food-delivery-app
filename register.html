<!DOCTYPE html>
<html>
<head>
    <title>Register - YourOrders</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 400px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #e63946; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e63946; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #c1121f; }
        .error { color: red; text-align: center; }
        p { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Register</h2>
        <p id="msgBox" class="error"></p>
        <form action="register" method="post">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="text" name="address" placeholder="Address" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get("error") === "true") {
            document.getElementById("msgBox").textContent =
                "Registration failed. Email may already exist.";
        }
    </script>
</body>
</html>
